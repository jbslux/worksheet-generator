<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Worksheet Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:"Comic Neue", cursive;
background:#f5f5f5;
margin:0;
padding:1rem;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:180px;
padding:1rem;
font-family:monospace;
margin-bottom:1rem;
}

button{
padding:0.6rem 1.2rem;
font-size:1rem;
background:#2E86C1;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.worksheet{
background:white;
padding:40px;
margin-top:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2E86C1;
font-size:38px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.story{
margin:20px 0;
line-height:1.5;
}

.question{
margin-top:20px;
font-size:18px;
}

.line{
border-bottom:1px solid #555;
height:22px;
margin-bottom:6px;
}

img{
width:100%;
max-height:300px;
object-fit:cover;
margin-bottom:20px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Worksheet Generator</h1>

<textarea id="inputText" placeholder="Titel:
Une découverte sur le vieux grenier

Text:
Léa aide sa grand-mère à ranger un vieux grenier...

Fragen:
De quoi parle le texte ?
Où se déroule l’histoire ?
Quel objet Léa découvre-t-elle ?"></textarea>

<button onclick="generateWorksheet()">Arbeitsblatt erstellen</button>

<div id="output"></div>

</div>

<script>

function generateWorksheet(){

const input=document.getElementById("inputText").value;

const titleMatch=input.match(/Titel:\s*(.+)/);
const textMatch=input.match(/Text:\s*([\s\S]*?)Fragen:/);
const questionsMatch=input.match(/Fragen:\s*([\s\S]*)/);

const title=titleMatch?titleMatch[1]:"Arbeitsblatt";
const story=textMatch?textMatch[1]:"";
const questions=questionsMatch?questionsMatch[1].split("\n").filter(q=>q.trim()!=""):[];

let imageKeyword=title.split(" ").slice(-1)[0];

let html=`<div class="worksheet">`;

html+=`<h1>${title}</h1>`;

html+=`<img src="https://source.unsplash.com/1200x400/?${imageKeyword}" />`;

html+=`
<div class="header">
<div>Nom: __________________</div>
<div>Date: __________________</div>
</div>
`;

html+=`<div class="story">${story}</div>`;

questions.forEach((q,i)=>{

html+=`<div class="question">${i+1}. ${q}</div>`;

for(let j=0;j<3;j++){
html+=`<div class="line"></div>`;
}

});

html+=`</div>`;

document.getElementById("output").innerHTML=html;

}

</script>

</body>
</html>
