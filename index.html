<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitsblatt Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:"Comic Neue", cursive;
background:#f5f5f5;
margin:0;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#2E86C1;
}

textarea{
width:100%;
height:200px;
padding:15px;
font-family:monospace;
font-size:14px;
margin-bottom:20px;
}

button{
padding:10px 18px;
font-size:16px;
background:#2E86C1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#1f6fa3;
}

.worksheet{
background:white;
padding:50px;
margin-top:30px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
text-align:center;
font-size:40px;
color:#2E86C1;
margin-bottom:20px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:30px;
font-size:18px;
}

.story{
margin:20px 0 30px 0;
line-height:1.5;
font-size:18px;
}

.question{
margin-top:20px;
font-size:18px;
}

.line{
border-bottom:1px solid #444;
height:24px;
margin-bottom:6px;
}

img{
width:100%;
max-height:300px;
object-fit:cover;
margin-bottom:20px;
border-radius:8px;
}

.controls{
margin-bottom:20px;
}

@media print{

body{
background:white;
}

textarea, .controls{
display:none;
}

.container{
max-width:100%;
}

.worksheet{
box-shadow:none;
margin-top:0;
padding:20px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Arbeitsblatt Generator</h1>

<textarea id="inputText" placeholder="Beispiel:

Une découverte sur le vieux grenier

Léa aide sa grand-mère à ranger un vieux grenier rempli d’objets anciens.

De quoi parle le texte ?
Où se déroule l’histoire ?
Qui sont les personnages principaux ?
Quel objet Léa découvre-t-elle ?
Pourquoi ce cartable est-il important ?"></textarea>

<div class="controls">
<button onclick="generateWorksheet()">Arbeitsblatt erstellen</button>
<button onclick="window.print()">Als PDF drucken</button>
</div>

<div id="output"></div>

</div>

<script>

function generateWorksheet(){

const raw=document.getElementById("inputText").value.trim();

const lines=raw.split("\n");

let title="";
let story="";
let questions=[];

lines.forEach(line=>{

line=line.trim();

if(line==="") return;

if(line.endsWith("?")){
questions.push(line);
}
else if(title===""){
title=line;
}
else{
story+=line+" ";
}

});

if(title==="") title="Arbeitsblatt";

let html=`<div class="worksheet">`;

html+=`<div class="title">${title}</div>`;

html+=`<img src="https://source.unsplash.com/1200x400/?${encodeURIComponent(title)}">`;

html+=`
<div class="header">
<div>Nom: ________________________</div>
<div>Date: ________________________</div>
</div>
`;

if(story!==""){
html+=`<div class="story">${story}</div>`;
}

questions.forEach((q,i)=>{

html+=`<div class="question">${i+1}. ${q}</div>`;

for(let j=0;j<3;j++){
html+=`<div class="line"></div>`;
}

});

html+=`</div>`;

document.getElementById("output").innerHTML=html;

}

</script>

</body>
</html>
