<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worksheet Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Comic Neue", cursive;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 850px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #2E86C1;
            font-size: 2.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .input-area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #2E86C1;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: #2E86C1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }

        button:hover {
            background: #2471A3;
        }

        button:active {
            transform: scale(0.98);
        }

        .print-btn {
            background: #27AE60;
        }

        .print-btn:hover {
            background: #1e8449;
        }

        /* Arbeitsblatt Styling */
        .worksheet {
            background: white;
            padding: 60px;
            min-height: 297mm; /* A4 Proportion */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
            margin-top: 20px;
            position: relative;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #2E86C1;
            margin-bottom: 25px;
            text-transform: uppercase;
            border-bottom: 3px double #2E86C1;
            padding-bottom: 10px;
        }

        .header-fields {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .header-fields span {
            border-bottom: 1px solid #000;
            min-width: 200px;
            display: inline-block;
        }

        .story-box {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid #2E86C1;
            font-style: italic;
        }

        .question-item {
            margin-bottom: 25px;
            page-break-inside: avoid;
        }

        .question-text {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .writing-lines {
            margin-top: 10px;
        }

        .line {
            border-bottom: 1px solid #888;
            height: 30px;
            margin-bottom: 5px;
        }

        /* Print Einstellungen */
        @media print {
            body { background: white; padding: 0; }
            .input-area, h1 { display: none; }
            .worksheet { 
                box-shadow: none; 
                margin: 0; 
                padding: 10mm; 
                width: 100%;
            }
            .story-box { background: transparent; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Arbeitsblatt-Generator</h1>

    <div class="input-area">
        <textarea id="inputText" placeholder="Titel der Geschichte...
        
Text der Geschichte hier einfügen...

Frage 1?
Frage 2?"></textarea>
        
        <div class="controls">
            <button onclick="generateWorksheet()">Arbeitsblatt erstellen</button>
            <button class="print-btn" onclick="window.print()">Als PDF speichern / Drucken</button>
        </div>
    </div>

    <div id="output"></div>
</div>

<script>
function generateWorksheet() {
    const raw = document.getElementById("inputText").value.trim();
    if (!raw) {
        alert("Bitte gib einen Text ein!");
        return;
    }

    const lines = raw.split("\n").map(l => l.trim()).filter(l => l !== "");
    
    let title = lines[0] || "Arbeitsblatt";
    let storyLines = [];
    let questions = [];

    // Logik: Erste Zeile ist Titel, Zeilen mit '?' sind Fragen, Rest ist Story
    for (let i = 1; i < lines.length; i++) {
        if (lines[i].includes("?")) {
            questions.push(lines[i]);
        } else {
            storyLines.push(lines[i]);
        }
    }

    let html = `
        <div class="worksheet">
            <div class="title">${title}</div>
            
            <div class="header-fields">
                <div>Nom: <span></span></div>
                <div>Date: <span></span></div>
            </div>

            <div class="story-box">
                ${storyLines.join("<br><br>")}
            </div>
    `;

    questions.forEach((q, index) => {
        html += `
            <div class="question-item">
                <div class="question-text">${index + 1}. ${q}</div>
                <div class="writing-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById("output").innerHTML = html;
    
    // Automatisch zum Ergebnis scrollen
    document.getElementById("output").scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
