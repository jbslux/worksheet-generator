<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Silben-Arbeitsblatt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Comic Neue", cursive; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; }
        
        .controls-box { 
            background: white; padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }
        textarea { 
            width: 100%; height: 200px; padding: 12px; border: 2px solid #ddd; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 15px;
        }
        .upload-section {
            background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 15px;
            border: 1px dashed #2E86C1;
        }
        
        button { 
            padding: 12px 20px; cursor: pointer; border-radius: 6px; border: none; 
            font-weight: bold; transition: 0.3s; margin-right: 10px;
        }
        .btn-gen { background: #2E86C1; color: white; }
        .btn-print { background: #27AE60; color: white; }
        button:hover { opacity: 0.8; }

        /* Das Arbeitsblatt */
        .worksheet { 
            background: white; padding: 50px; min-height: 297mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        
        .ws-top-meta { 
            display: flex; justify-content: space-between; 
            margin-bottom: 30px; font-size: 18px; font-weight: bold; 
        }
        .ws-top-meta span { border-bottom: 2px solid #333; min-width: 200px; display: inline-block; }

        .ws-title { text-align: center; font-size: 38px; color: #2E86C1; margin: 20px 0; font-weight: 700; }
        
        .ws-image-container { display: flex; justify-content: center; margin-bottom: 30px; }
        #previewImg { max-width: 80%; max-height: 300px; object-fit: contain; border-radius: 10px; }

        .ws-content { font-size: 20px; line-height: 1.8; margin-bottom: 40px; white-space: pre-wrap; }

        /* Silben-Farben */
        .syllable-1 { color: #0040ff; } /* Blau */
        .syllable-2 { color: #ff0000; } /* Rot */

        .q-block { margin-bottom: 25px; page-break-inside: avoid; }
        .q-text { font-weight: bold; font-size: 19px; margin-bottom: 8px; }
        .q-line { border-bottom: 1px solid #555; height: 32px; }

        @media print {
            body { background: white; padding: 0; }
            .controls-box, h1 { display: none; }
            .worksheet { padding: 0; box-shadow: none; width: 100%; }
            @page { margin: 1.5cm; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Silben-Generator</h1>
    
    <div class="controls-box">
        <textarea id="inputText" placeholder="Titel...
        
Text mit Sil·ben·punk·ten ein·fü·gen...

Frage?"></textarea>
        
        <div class="upload-section">
            <label><strong>Bild hochladen:</strong> </label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <button class="btn-gen" onclick="generate()">Arbeitsblatt erstellen</button>
        <button class="btn-print" onclick="window.print()">Drucken / PDF</button>
    </div>

    <div id="output"></div>
</div>

<script>
let currentImageData = "";

document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) { currentImageData = event.target.result; };
        reader.readAsDataURL(file);
    }
});

function colorizeSyllables(text) {
    if (!text.includes('·')) return text;

    // Wir teilen den Text in Wörter auf, behalten aber Leerzeichen und Zeilenumbrüche bei
    return text.split(/(\s+)/).map(word => {
        if (!word.includes('·')) return word;

        const syllables = word.split('·');
        return syllables.map((syl, index) => {
            const colorClass = (index % 2 === 0) ? 'syllable-1' : 'syllable-2';
            return `<span class="${colorClass}">${syl}</span>`;
        }).join('');
    }).join('');
}

function generate() {
    const rawInput = document.getElementById("inputText").value.trim();
    if(!rawInput) return;

    const lines = rawInput.split('\n').filter(l => l.trim() !== "");
    const title = lines[0];
    const questions = lines.filter(l => l.includes('?'));
    const storyLines = lines.slice(1).filter(l => !l.includes('?'));

    // Silben-Färbung auf Titel und Story anwenden
    const coloredTitle = colorizeSyllables(title);
    const coloredStory = colorizeSyllables(storyLines.join('\n\n'));

    let html = `
        <div class="worksheet">
            <div class="ws-top-meta">
                <div>Nom: <span></span></div>
                <div>Date: <span></span></div>
            </div>

            <div class="ws-title">${coloredTitle}</div>

            <div class="ws-image-container">
                ${currentImageData ? `<img src="${currentImageData}" id="previewImg">` : ''}
            </div>

            <div class="ws-content">${coloredStory}</div>
    `;

    questions.forEach((q, i) => {
        html += `
            <div class="q-block">
                <div class="q-text">${i+1}. ${q}</div>
                <div class="q-line"></div>
                <div class="q-line"></div>
                <div class="q-line"></div>
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById('output').innerHTML = html;
}
</script>

</body>
</html>
