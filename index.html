<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Perfekter Silben-Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Festgelegte Farben für das gesamte Dokument */
        :root {
            --mein-blau: #0040ff;
            --mein-rot: #ff0000;
        }

        body { 
            font-family: "Comic Neue", cursive; 
            background: #f0f2f5; 
            padding: 20px; 
        }

        .container { max-width: 800px; margin: auto; }

        /* Eingabebereich (wird nicht gedruckt) */
        .input-box {
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-bottom: 30px;
        }

        textarea {
            width: 100%; height: 200px; padding: 12px;
            border: 2px solid #ddd; border-radius: 8px;
            font-size: 14px; box-sizing: border-box;
        }

        .upload-zone {
            margin: 15px 0; padding: 10px;
            border: 1px dashed var(--mein-blau); border-radius: 6px;
            background: #f9f9f9;
        }

        button {
            padding: 12px 25px; cursor: pointer; border-radius: 6px;
            border: none; font-weight: bold; font-size: 16px;
        }
        .btn-gen { background: var(--mein-blau); color: white; }
        .btn-print { background: #27AE60; color: white; margin-left: 10px; }

        /* ARBEITSBLATT DESIGN */
        .worksheet {
            background: white; padding: 60px; min-height: 297mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            color: #333; /* Standardfarbe */
        }

        .ws-header {
            display: flex; justify-content: space-between;
            margin-bottom: 40px; font-weight: bold; font-size: 18px;
        }
        .ws-header span { border-bottom: 2px solid #333; min-width: 200px; display: inline-block; }

        .ws-title {
            text-align: center; font-size: 36px; font-weight: bold;
            margin-bottom: 30px;
        }

        .ws-img-holder { display: flex; justify-content: center; margin-bottom: 30px; }
        #ws-img { max-width: 90%; max-height: 350px; border-radius: 8px; }

        .ws-content {
            font-size: 21px; line-height: 1.8;
            margin-bottom: 50px; white-space: pre-wrap;
            text-align: justify;
        }

        /* Silben-Modus: Alles wird blau, rote Silben werden drübergelegt */
        .is-syllable-mode { color: var(--mein-blau) !important; }
        .red-syl { color: var(--mein-rot) !important; }

        /* Fragen-Bereich */
.q-section { margin-top: 40px; color: #333; }
.q-item { margin-bottom: 30px; page-break-inside: avoid; }
.q-title { font-weight: bold; font-size: 20px; margin-bottom: 10px; }
.q-line { border-bottom: 1px solid #666; height: 35px; }

        @media print {
            body { background: white; padding: 0; }
            .input-box, h1 { display: none; }
            .worksheet { box-shadow: none; padding: 0; width: 100%; }
            @page { margin: 1.5cm; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Arbeitsblatt Creator</h1>

    <div class="input-box">
        <textarea id="mainInput" placeholder="Titel (Sterne werden gelöscht)

Text mit Sil·ben·punk·ten...

1. Erste Frage?
2. Zweite Frage?"></textarea>

        <div class="upload-zone">
            <label>Bild auswählen: </label>
            <input type="file" id="fileIn" accept="image/*">
        </div>

        <button class="btn-gen" onclick="makeWS()">Arbeitsblatt erstellen</button>
        <button class="btn-print" onclick="window.print()">Drucken / PDF</button>
    </div>

    <div id="output"></div>
</div>

<script>
let imgData = "";

document.getElementById('fileIn').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = (ev) => imgData = ev.target.result;
    reader.readAsDataURL(e.target.files[0]);
};

function formatText(text, isSyllable) {
    if (!isSyllable) return text;

    // Text in Stücke teilen (Wörter und Leerzeichen/Satzzeichen)
    return text.split(/(\s+)/).map(part => {
        if (part.trim() === "") return part;

        // Wort von Satzzeichen trennen
        const match = part.match(/^([a-zA-ZäöüÄÖÜß·]+)([^a-zA-ZäöüÄÖÜß·]*)$/);
        if (!match) return part;

        const word = match[1];
        const punc = match[2];

        // Wort in Silben zerlegen (am Mittelpunkt)
        const syls = word.split('·');
        const coloredWord = syls.map((s, i) => {
            // Jede 2. Silbe wird rot, der Rest bleibt blau (durch den Container)
            return i % 2 !== 0 ? `<span class="red-syl">${s}</span>` : s;
        }).join('');

        return coloredWord + punc;
    }).join('');
}

function makeWS() {
    const raw = document.getElementById('mainInput').value.trim();
    if (!raw) return;

    const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
    const hasSyllables = raw.includes('·');

    // 1. Titel (Bereinigen & Formatieren)
    const titleClean = lines[0].replace(/\*/g, '');
    const titleHTML = formatText(titleClean, hasSyllables);

    // 2. Trennung (Fragen fangen mit Zahl+Punkt an)
    const qReg = /^\d+\.\s/;
    const questions = lines.filter(l => qReg.test(l));
    const storyLines = lines.slice(1).filter(l => !qReg.test(l));
    const storyHTML = formatText(storyLines.join('\n\n'), hasSyllables);

    // HTML zusammenbauen
    let html = `
        <div class="worksheet">
            <div class="ws-header">
                <div>Nom: <span></span></div>
                <div>Date: <span></span></div>
            </div>

            <div class="ws-title ${hasSyllables ? 'is-syllable-mode' : ''}">${titleHTML}</div>

            <div class="ws-img-holder">
                ${imgData ? `<img src="${imgData}" id="ws-img">` : ''}
            </div>

            <div class="ws-content ${hasSyllables ? 'is-syllable-mode' : ''}">${storyHTML}</div>

            <div class="q-section">
    `;

    questions.forEach(q => {
        html += `
            <div class="q-item">
                <div class="q-title">${q}</div>
                <div class="q-line"></div>
                <div class="q-line"></div>
                <div class="q-line"></div>
            </div>
        `;
    });

    html += `</div></div>`;
    document.getElementById('output').innerHTML = html;
}
</script>

</body>
</html>
